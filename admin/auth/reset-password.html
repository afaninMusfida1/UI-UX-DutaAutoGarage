<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - DUTA Auto Garage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold-primary: #F5A623;
      --gold-muted: #D7C3AE;
      --card-bg: #1A2138;
      --input-bg: #212631;
      --input-border: #3A3F4A;
      --text-white: #E2E2E2;
      --text-gray: #9F8E7A;
      --text-dark: #3A2303;
      
      --font-heading: 'Montserrat', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background-color: #060B14;
      color: var(--text-white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* ===== Background & Overlay ===== */
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.4; /* Menggelapkan gambar bawaan */
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(10, 15, 30, 0.4) 0%, rgba(6, 11, 20, 0.95) 100%);
      z-index: 1;
    }

    /* ===== Wrapper Konten ===== */
    .content-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== Branding Logo ===== */
    .brand-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand-title {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 32px;
      color: var(--gold-primary);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .brand-subtitle {
      font-size: 11px;
      font-weight: 600;
      color: var(--gold-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ===== Card Form ===== */
    .reset-card {
      background-color: var(--card-bg);
      width: 100%;
      border-radius: 12px;
      padding: 48px 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-header h2 {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 600;
      color: #FFFFFF;
      margin-bottom: 16px;
    }

    .card-header p {
      font-size: 13px;
      color: var(--gold-muted);
      line-height: 1.6;
      max-width: 380px;
      margin: 0 auto;
    }

    /* ===== Form Styles ===== */
    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-white);
      margin-bottom: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--text-gray);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    input[type="email"] {
      width: 100%;
      background-color: var(--input-bg);
      border: 1px solid var(--input-border);
      color: #FFFFFF;
      font-family: var(--font-body);
      font-size: 14px;
      padding: 14px 16px 14px 44px; /* Padding kiri untuk icon */
      border-radius: 6px;
      outline: none;
      transition: all 0.2s ease;
    }

    input[type="email"]:focus {
      border-color: var(--gold-primary);
    }

    input::placeholder {
      color: #6B7280;
    }

    /* ===== Submit Button ===== */
    .btn-submit {
      width: 100%;
      background-color: var(--gold-primary);
      color: var(--text-dark);
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background-color 0.2s ease, transform 0.1s ease;
      margin-bottom: 32px;
    }

    .btn-submit:hover {
      background-color: #f8b449;
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    .btn-submit svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ===== Back to Login Link ===== */
    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-white);
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .back-link:hover {
      opacity: 0.8;
    }

    .back-link svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ===== Responsif ===== */
    @media (max-width: 480px) {
      .reset-card {
        padding: 32px 24px;
      }
      .brand-title {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

  <img src="images/background-image-3.png" alt="Duta Auto Garage Background" class="bg-image">
  <div class="overlay"></div>

  <div class="content-wrapper">
    
    <div class="brand-header">
      <h1 class="brand-title">DUTA AUTO GARAGE</h1>
      <p class="brand-subtitle">BENGKEL TEPERCAYA, LAYANAN PRIMA</p>
    </div>

    <div class="reset-card">
      
      <div class="card-header">
        <h2>Lupa Password</h2>
        <p>Masukkan alamat email Anda yang terdaftar. Kami akan mengirimkan tautan untuk mengatur ulang kata sandi Anda.</p>
      </div>

      <form action="#" method="POST">
        
        <div class="form-group">
          <label for="email">Alamat Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input type="email" id="email" placeholder="name@example.com" required>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          Kirim Tautan Reset
          <svg viewBox="0 0 24 24">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </form>

      <a href="login.html" class="back-link">
        <svg viewBox="0 0 24 24">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Kembali ke Login
      </a>

    </div>
  </div>

</body>
</html>
