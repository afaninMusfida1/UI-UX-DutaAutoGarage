<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lupa Password - Duta Auto Garage</title>
  <style>
    /* ===== CSS LENGKAP SEPERTI ASLI ===== */
    @font-face {
      font-family: 'Montserrat';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url(data:font/woff2;base64,...) format('woff2');
    }
    /* ... (saya tidak akan menulis ulang seluruh CSS, tapi kamu sudah punya di file asli) ... */
    /* Pastikan CSS di file reset-password.html tetap seperti yang kamu punya */
  </style>
</head>
<body>
  <div class="page">
    <div class="content">
      <div class="brand">
        <h1>DUTA AUTO GARAGE</h1>
        <div class="tagline">BENGKEL TEPERCAYA, LAYANAN PRIMA</div>
      </div>
      <div class="card">
        <h2>Lupa Password</h2>
        <div class="desc">Masukkan alamat email Anda yang terdaftar. Kami akan mengirimkan tautan untuk mengatur ulang kata sandi Anda.</div>
        <div class="field">
          <label>ALAMAT EMAIL</label>
          <div class="input-wrap">
            <span class="icon">
              <svg viewBox="0 0 20 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="1" y="2" width="18" height="12" rx="1.5" stroke="#D7C3AE" stroke-width="1.3"/>
                <path d="M2 3.5L10 9.5L18 3.5" stroke="#D7C3AE" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <input id="email" type="email" placeholder="name@example.com" />
          </div>
        </div>
        <button id="resetBtn" class="btn-reset" type="button">
          KIRIM TAUTAN RESET
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 8H14M14 8L9 3M14 8L9 13" stroke="#644000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <a href="login.html" class="back-link">
          <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 6H2M2 6L6 2M2 6L6 10" stroke="#D7C3AE" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Kembali ke Login
        </a>
      </div>
    </div>
  </div>
  <!-- HANYA SCRIPT INI -->
  <script src="/main.js"></script>
</body>
</html>
