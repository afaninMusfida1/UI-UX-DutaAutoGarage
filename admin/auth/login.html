<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DUTA Auto Garage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-navy: #050A14;
      --bg-input: #1C1F27;
      --gold-primary: #F8B459;
      --gold-muted: #D19A5B;
      --text-white: #FFFFFF;
      --text-gray: #9CA3AF;
      --text-dark: #3A2303;
      
      --font-heading: 'Montserrat', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-navy);
      color: var(--text-white);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Layout Utama */
    .split-layout {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* Bagian Kiri (Gambar) */
    .left-pane {
      position: relative;
      flex: 1.3;
      background-color: #111;
      overflow: hidden; /* Mencegah gambar meluber */
    }

    /* Styling untuk tag <img> agar berfungsi layaknya background-cover */
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Gradient overlay agar menyatu dengan background kanan */
    .left-pane::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(5, 10, 20, 0.2) 0%, rgba(5, 10, 20, 0.8) 60%, rgba(5, 10, 20, 1) 100%);
      z-index: 1;
    }

    .brand-text {
      position: absolute;
      bottom: 50px;
      left: 50px;
      z-index: 2;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 14px;
      color: var(--gold-muted);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* Bagian Kanan (Form) */
    .right-pane {
      flex: 1;
      background-color: var(--bg-navy);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 80px;
      position: relative;
      z-index: 2;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    /* Tipografi Header */
    .login-header {
      margin-bottom: 32px;
    }

    .login-header h1 {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 700;
      color: var(--gold-primary);
      margin-bottom: 8px;
    }

    .login-header h2 {
      font-size: 15px;
      font-weight: 400;
      color: #E5E7EB;
      margin-bottom: 12px;
    }

    .login-header p {
      font-size: 13px;
      color: var(--text-gray);
      line-height: 1.5;
    }

    /* Styling Form */
    .form-group {
      margin-bottom: 24px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    label {
      font-size: 11px;
      color: var(--text-gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .forgot-link {
      font-size: 12px;
      color: var(--gold-primary);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .forgot-link:hover {
      opacity: 0.8;
    }

    /* Input Field */
    .input-wrapper {
      position: relative;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background-color: var(--bg-input);
      border: 1px solid transparent;
      color: var(--text-gray);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 14px 16px;
      border-radius: 6px;
      outline: none;
      transition: border 0.3s ease;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #374151;
      color: var(--text-white);
    }

    input::placeholder {
      color: #6B7280;
    }

    /* Icon Mata (Password) */
    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-gray);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .toggle-password svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Checkbox */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--gold-primary);
      cursor: pointer;
      background-color: var(--bg-input);
      border: 1px solid #374151;
    }

    .checkbox-group label {
      font-size: 13px;
      color: #D1D5DB;
      text-transform: none;
      letter-spacing: normal;
      cursor: pointer;
    }

    /* Tombol Login */
    .btn-login {
      width: 100%;
      background-color: var(--gold-primary);
      color: var(--text-dark);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 15px;
      padding: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.1s ease;
      margin-bottom: 24px;
    }

    .btn-login:hover {
      opacity: 0.9;
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    /* Footer / Register Link */
    .signup-link {
      font-size: 13px;
      color: var(--text-gray);
    }

    .signup-link a {
      color: var(--gold-primary);
      text-decoration: none;
      font-weight: 500;
      margin-left: 4px;
      transition: opacity 0.2s;
    }

    .signup-link a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    /* Responsif untuk layar kecil */
    @media (max-width: 900px) {
      .left-pane {
        display: none; /* Sembunyikan gambar pada mobile */
      }
      .right-pane {
        padding: 40px;
        justify-content: center;
      }
      .brand-text {
        display: block;
        position: static;
        margin-bottom: 40px;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <div class="split-layout">
    
    <div class="left-pane">
      <img src="images/image-4.png" alt="Bengkel Duta Auto Garage" class="bg-image">
      <div class="brand-text">DUTA AUTO GARAGE</div>
    </div>

    <div class="right-pane">
      <div class="login-container">
        
        <div class="login-header">
          <h1>DUTA Auto Garage</h1>
          <h2>Selamat Datang</h2>
          <p>Masuk untuk mengakses akun bengkel Anda dan mengelola layanan kendaraan dengan mudah.</p>
        </div>

        <form action="#" method="POST">
          
          <div class="form-group">
            <div class="label-row">
              <label for="email">Alamat Email</label>
            </div>
            <div class="input-wrapper">
              <input type="email" id="email" placeholder="mechanic@duta-auto.com" required>
            </div>
          </div>

          <div class="form-group">
            <div class="label-row">
              <label for="password">Password</label>
              <a href="#" class="forgot-link">Lupa Password?</a>
            </div>
            <div class="input-wrapper">
              <input type="password" id="password" placeholder="••••••••" required>
              <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24">
                  <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group checkbox-group">
            <input type="checkbox" id="remember-me">
            <label for="remember-me">Ingat perangkat ini</label>
          </div>

          <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="signup-link">
          Belum punya akun? <a href="#">Daftarkan akun Anda</a>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
